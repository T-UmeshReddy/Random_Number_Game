<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Guess Number Game</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <div class="game-card">

        <h1>🎯 Guess The Number</h1>
        <p class="subtitle">(Between 1 — 100)</p>

        <input id="userInput" type="number" placeholder="Enter number">

        <button onclick="onCheck()">Guess</button>

        <p id="status" class="status"></p>

        <div class="chances-box">
            Chances Left:
            <span id="chancesLeft">5</span>
        </div>

        <p id="answer" class="answer"></p>

    </div>

    <script src="script.js"></script>

</body>

</html>
